<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Spaces Remaining</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .counter-box {
      background: #ffffff;
      padding: 24px 32px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      text-align: center;
    }
    .label {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .value {
      font-size: 40px;
      font-weight: 700;
      color: #d32f2f;
    }
    .updated {
      margin-top: 8px;
      font-size: 11px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="counter-box">
    <div class="label">Spaces Remaining</div>
    <div class="value" id="remainingSpaces">–</div>
    <div class="updated" id="updatedAt"></div>
  </div>

  <script>
    const API_KEY = "c9e7e63247e20eaad54480e24467909c";
    const FORM_ID = "261441773949872";
    const MAX_SPACES = 80; // Change this number if needed

    async function fetchRemainingSpaces() {
      try {
        const url = `https://api.jotform.com/form/${FORM_ID}/submissions?apiKey=${API_KEY}&limit=0`;
        const res = await fetch(url);
        const data = await res.json();

        const submissionCount =
          (data.resultSet && (data.resultSet.count || data.resultSet.total)) ||
          data.count ||
          0;

        const remaining = Math.max(MAX_SPACES - submissionCount, 0);

        document.getElementById("remainingSpaces").textContent = remaining;

        const now = new Date();
        document.getElementById("updatedAt").textContent =
          "Last updated: " + now.toLocaleTimeString();
      } catch (err) {
        console.error(err);
        document.getElementById("remainingSpaces").textContent = "Error";
      }
    }

    fetchRemainingSpaces();
    setInterval(fetchRemainingSpaces, 15000);
  </script>
</body>
</html>
