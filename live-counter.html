<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Live Jotform Submission Counter</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .counter-box {
      background: #ffffff;
      padding: 24px 32px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      text-align: center;
    }
    .label {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .value {
      font-size: 40px;
      font-weight: 700;
      color: #2e7d32;
    }
    .updated {
      margin-top: 8px;
      font-size: 11px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="counter-box">
    <div class="label">Total submissions</div>
    <div class="value" id="submissionCount">–</div>
    <div class="updated" id="updatedAt"></div>
  </div>

  <script>
    const API_KEY = c9e7e63247e20eaad54480e24467909c;
    const FORM_ID = 261441773949872;

    async function fetchSubmissionCount() {
      try {
        const url = `https://api.jotform.com/form/${261441773949872}/submissions?apiKey=${API_KEY}&limit=0`;
        const res = await fetch(url);
        const data = await res.json();

        // Jotform API usually returns count in "resultSet" or "resultSet.count"
        const count =
          (data.resultSet && (data.resultSet.count || data.resultSet.total)) ||
          data.count ||
          0;

        document.getElementById("submissionCount").textContent = count;

        const now = new Date();
        document.getElementById("updatedAt").textContent =
          "Last updated: " + now.toLocaleTimeString();
      } catch (err) {
        console.error(err);
        document.getElementById("submissionCount").textContent = "Error";
      }
    }

    // Initial load
    fetchSubmissionCount();
    // Refresh every 15 seconds
    setInterval(fetchSubmissionCount, 15000);
  </script>
</body>
</html>
